<!DOCTYPE html>
<html>
<head>
<title>Puzzle Game</title>

<style>

body{
text-align:center;
font-family:Arial;
background:linear-gradient(45deg,#ff758c,#ff7eb3);
color:white;
}

#puzzle{
width:300px;
height:300px;
margin:40px auto;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:2px;
}

.piece{
width:100px;
height:100px;
background-image:url('sow.jpeg');
background-size:300px 300px;
border:1px solid white;
cursor:pointer;
}

button{
padding:10px 20px;
font-size:18px;
border:none;
border-radius:10px;
background:#ff4081;
color:white;
cursor:pointer;
margin-top:20px;
}

#message{
display:none;
font-size:35px;
margin-top:20px;
color:yellow;
}

/* fireworks */

.firework{
position:fixed;
font-size:35px;
animation:explode 1s ease-out forwards;
}

@keyframes explode{
0%{transform:scale(0);}
100%{transform:scale(3);opacity:0;}
}

</style>

<script>

let positions=[0,1,2,3,4,5,6,7,8];
let dragged;

function shuffle(array){
for(let i=array.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[array[i],array[j]]=[array[j],array[i]];
}
}

function startPuzzle(){

shuffle(positions);

let puzzle=document.getElementById("puzzle");
puzzle.innerHTML="";

for(let i=0;i<9;i++){

let piece=document.createElement("div");
piece.className="piece";

let pos=positions[i];

let x=(pos%3)*100;
let y=Math.floor(pos/3)*100;

piece.style.backgroundPosition=`-${x}px -${y}px`;

piece.dataset.correct=pos;

piece.draggable=true;

piece.addEventListener("dragstart",dragStart);
piece.addEventListener("dragover",dragOver);
piece.addEventListener("drop",dropPiece);

puzzle.appendChild(piece);

}

}

function dragStart(){
dragged=this;
}

function dragOver(e){
e.preventDefault();
}

function dropPiece(){

let temp=this.style.backgroundPosition;
let tempCorrect=this.dataset.correct;

this.style.backgroundPosition=dragged.style.backgroundPosition;
this.dataset.correct=dragged.dataset.correct;

dragged.style.backgroundPosition=temp;
dragged.dataset.correct=tempCorrect;

checkWin();

}

function checkWin(){

let pieces=document.querySelectorAll(".piece");

let correct=true;

pieces.forEach((piece,index)=>{

if(parseInt(piece.dataset.correct)!==index){
correct=false;
}

});

if(correct){

showFireworks();

document.getElementById("message").style.display="block";

}

}

function showFireworks(){

let duration = 60000; // 1 minute
let interval = 200;   // create fireworks every 200ms

let fireInterval = setInterval(function(){

let fire=document.createElement("div");
fire.className="firework";

let emojis=["🎆","✨","🎇","💥","🌟"];

fire.innerHTML=emojis[Math.floor(Math.random()*emojis.length)];

fire.style.left=Math.random()*100+"%";
fire.style.top=Math.random()*100+"%";

document.body.appendChild(fire);

setTimeout(()=>fire.remove(),1000);

},interval);

setTimeout(function(){
clearInterval(fireInterval);
},duration);

}

window.onload=startPuzzle;

</script>

</head>

<body>

<h1>Birthday Puzzle 🧩</h1>

<p>Arrange the pieces to complete the photo</p>

<div id="puzzle"></div>

<div id="message">
🎉 Sowmiyaaa ❤️ 🎉
<p>Thank you for being part of my life💖</p>
<p>I really mis our those memorable days.You will always very close to my heart🫂🫂🫂</p>
</div>


<br>

<a href="index.html">
<button>Back to Home</button>
</a>

</body>
</html>
